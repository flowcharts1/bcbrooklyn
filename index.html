<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bcbrooklyn</title>

<style>
    
/*start*/
    
    
    
    /*end*/
:root {
    --maroon: #882346;
    --light-gray: #FAF0C5;
    --text-dark: #111;
    --hero:#1D4B52;
    --yellow: #f4c542;
    --light-yellow: #fff6d6;
    --box-spacing: 15px;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
.page-wrap {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    
}
html, body {
  height: 100%;
}  
.mobile-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 110vh;
  overflow: hidden;
  z-index: -1;
  transform: translateZ(0);
  will-change: transform;
  backface-visibility: hidden;
}
.mobile-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-dark);
    margin:0;
    text-align:center;
    display: flex;
    flex-direction: column;
}
/* ===== HERO TEXT ===== */
.herop{
    position: absolute;
    top: 1px;
    left: 50%;
    transform: translateX(-50%);
}
.hero h1 {
    padding-top:15px;
    padding: 10px;
    text-align: center;
    font-size: clamp(2.5rem, 4vw, 20rem);
    line-height: 0.1; 
    font-weight: 500;
    line-height: 1;
    color: var(--hero);
    letter-spacing: -0.5px;
    text-shadow:
    0 0 16px rgba(255, 255, 255,0.8),
    0 0 16px rgba(255, 255, 255,0.8); 
} 
.heroh {
    padding-top: 10px;
    border-top: 1px solid transparent;
    text-align: center;
    color:var(--hero);
    text-shadow:
      0 0 16px rgba(255, 255, 255,10),
      0 0 16px rgba(255, 255, 255,0.8);
}
.title-break {
  display: none;
}
@media (max-width: 560px) {
  .title-break {
    display: inline;
  }
}
@media (min-width: 768px) {}
    
/* ==== MAIN CONTENT ==== */    
.primary-tabs {
    margin-top: 10px;
}
.primary-tab {
    display: inline-block;
    padding: 1px 10px 1px;
    margin: 5px;
    border-radius: 12px;
    font-size: 25px;
    font-weight: bold;
    cursor: pointer;
    border: 3px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    -webkit-transition: 0.2s ease;
    transition: 0.2s ease;
}
.primary-tab.active {
    background: var(--yellow);
    color: white;
    border: 3px solid var(--yellow);
}
/* ======== SUB TABS (OFF) ======== */
.sub-tabs {
    margin-top: 40px;
    display:none;
    pointer-events: none;
}
.sub-tab {
    display: none;
    pointer-events: none;
    padding: 15px 50px;
    margin: 10px;
    border-radius: 12px;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    border: 3px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    -webkit-transition: 0.2s ease;
    transition: 0.2s ease;
}
.sub-tab.active {
    background: var(--yellow);
    color: white;
}
/* ========= CLUB LIST ======= */
#clubContainer {
    width: 90%;
    max-width: 1000px;
    margin: 10px auto;
}
.club-box {
    background: white;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: var(--box-spacing);
    text-align: left;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
.club-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
}
.club-icon {
    width: 60px;
    height: 60px;
    border-radius: 30px;
    object-fit: cover;
    background: transparent;
}
.club-text {
    flex: 1;
}
.club-line1 {
    font-size: 1em;
    font-weight: bold;
    margin-bottom: 1px;
}
.club-line {
    font-size: 1em;
    margin: 3px 0;
}
.club-line a {
    text-decoration: none;
    font-weight: bold;
    color: #3366cc;
}
.club-line span {
    text-decoration: none;
    font-weight: bold;
    color: #3366cc;
}
.club-line a:hover { text-decoration: underline; }
.club-line span:hover { text-decoration: underline; }

.spinner {
  display: inline-block;
  cursor: pointer;
  transform-origin: center center;
  flex: 0 0 auto;
}
.spin {
  -webkit-animation: spinOnce 0.6s linear;
  animation: spinOnce 0.6s linear;
}
@-webkit-keyframes spinOnce {
  from { -webkit-transform: rotate(0deg); }
  to   { -webkit-transform: rotate(360deg); }
}
@keyframes spinOnce {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
    
/* ===== BOTTOM BAR ===== */
.bike-icon {
  height: 1.2em;
  display: block;
  filter: invert(1);
}
.bottom-bar {
    background: var(--maroon);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 20px;
    font-size: 0.85rem;
    margin-top: auto;
}
.bottom-bar a {
    color: white;
    text-decoration: none;
}
.contact-btn {
    padding: 4px 10px;
    border: 1px solid white;
    border-radius: 4px;
    -webkit-transition: background 0.15s ease;
    transition: background 0.15s ease;
}
.contact-btn:hover {
    background: white;
    color: var(--maroon);
}


/* ===================================================
   EVENTS SECTION
   =================================================== */

#eventsSection {
    display: none;
    width: 90%;
    max-width: 1000px;
    margin: 12px auto 0;
}

/* --- Top control bar --- */
.events-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    margin-bottom: 10px;
    position: relative;
}

/* --- Timeframe nav: < Upcoming > --- */
/* Wrapper keeps the three pieces together without affecting the filter side */
.evt-timeframe-nav {
    display: flex;
    align-items: center;
    gap: 0px;
}

/* The nav arrows reuse .evt-ctrl-btn visuals but are separate elements */
.evt-nav-arrow {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 1.15rem;   /* slightly larger than label for tap comfort */
    font-weight: bold;
    color: white;
    padding: 4px 6px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    /* same glow as original ctrl btn */
    text-shadow:
        0 0 10px rgba(133, 61, 81,0.9),
        0px 0px 10px rgba(133, 61, 81,0.9);
    -webkit-transition: opacity 0.2s ease;
    transition: opacity 0.2s ease;
}
/* dimmed state when no more modes in that direction */
.evt-nav-arrow.disabled {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
}

/* Sliding label container — clips during animation */
.evt-label-clip {
    overflow: hidden;
    /* width is set to match the widest label so the layout never jumps */
     min-width: 0;        /* shrinks to content */
    width: 100px;        /* fixed width wide enough for longest label */
    min-width: 90px;
    text-align: center;
    
}
/* Inner track holding current + incoming label side by side */
.evt-label-track {
    display: -webkit-box;
    display: flex;
    width: 200%;   /* two slots */
    -webkit-transition: -webkit-transform 0.28s ease;
    transition: transform 0.28s ease;
    
    
}
/* Each slot is exactly half the track = full clip width */
.evt-label-slot {
    background: transparent;
    border: none;
    font-size: 1.05rem;
    font-weight: bold;
    color: white;
    padding: 4px 2px;
    letter-spacing: 0.01em;
    white-space: nowrap;
    text-shadow:
        0 0 10px rgba(133, 61, 81,0.9),
        0px 0px 10px rgba(133, 61, 81,0.9);
    display: block;
    width: 100%;
    text-align: center;
    width: 50%;
    flex-shrink: 0;
    -webkit-flex-shrink: 0;
    
    
}
/* The actual text — inherits ctrl-btn style exactly */
.evt-label-text {
    background: transparent;
    border: none;
    font-size: 1.05rem;
    font-weight: bold;
    color: white;
    padding: 4px 2px;
    letter-spacing: 0.01em;
    white-space: nowrap;
    text-shadow:
        0 0 10px rgba(133, 61, 81,0.9),
        0px 0px 10px rgba(133, 61, 81,0.9);
    display: block;
    width: 100%;
    text-align: center;
}

/* --- Filter button (unchanged visuals) --- */
.evt-ctrl-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 1.05rem;
    font-weight: bold;
    color: white;
    padding: 4px 2px;
    letter-spacing: 0.01em;
    text-shadow:
        0 0 10px rgba(133, 61, 81,0.9),
        0px 0px 10px rgba(133, 61, 81,0.9);
    -webkit-tap-highlight-color: transparent;
    outline: none;
}
.evt-ctrl-btn .arrow {
    display: inline-block;
    -webkit-transition: -webkit-transform 0.25s ease;
    transition: transform 0.25s ease;
    text-shadow:
        0 0 5px rgba(133, 61, 81,0.9),
        0px 0px 5px rgba(133, 61, 81,0.9), 0 0 10px rgba(133, 61, 81,0.9), 0 0 10px rgba(133, 61, 81,0.9),
        0px 0px 10px rgba(133, 61, 81,0.9),
        0px 0px 10px rgba(133, 61, 81,0.9);
}
.evt-ctrl-btn.open .arrow {
    -webkit-transform: rotate(180deg);
    transform: rotate(180deg);
}

/* --- Filter dropdown (unchanged) --- */
.evt-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    z-index: 50;
    border-radius: 10px;
    padding: 10px 12px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.22);
}
.evt-dropdown.open {
    display: block;
}
.evt-dropdown.filter-picker {
    right: 0;
    background: #edf4ff;
    min-width: 150px;
}
.filter-opts {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.filter-opt {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: bold;
    color: #335;
    text-align: left;
    padding: 3px 2px;
    -webkit-tap-highlight-color: transparent;
    outline: none;
}
.filter-opt.selected {
    color: #2255cc;
    text-decoration: underline;
}

/* --- Event list --- */
#eventContainer {
    margin-top: 4px;
    padding-bottom: 16px;
    min-width:0px;
}
.evt-day-head {
    font-size: 0.78rem;
    font-weight: bold;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 0 8px rgba(0,0,0,0.4);
    text-align: left;
    margin: 10px 0 4px;
    padding-left: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.evt-box {
    background: white;
    border-radius: 8px;
    padding: 7px 10px;
    margin-bottom: 6px;
    text-align: left;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
    -webkit-transition: opacity 0.12s;
    transition: opacity 0.12s;
    min-width:0px;
}
.evt-box:active {
    opacity: 0.75;
}
.evt-icon-wrap {
    width: 38px;
    height: 38px;
    border-radius: 6px;
    flex-shrink: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
}
.evt-icon-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px;
    display: block;
}
.evt-text {
     flex: 1 1 1px;
    min-width: 0;
    max-width: 100%;
    width: 0;  
}
.evt-title {
    font-size: 0.88rem;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis; 
    min-width:0px;
}
.evt-meta {
    font-size: 0.78rem;
    color: #555;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

    min-width:0px;
}

/* --- Overlay / detail --- */
#evtOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    -webkit-transition: opacity 0.25s ease;
    transition: opacity 0.25s ease;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
#evtOverlay.active {
    opacity: 1;
    pointer-events: auto;
    background: rgba(0,0,0,0.78);
}
.evt-detail {
    position: relative;
    margin: 54px auto 40px;
    padding: 0 20px 30px;
    display: -webkit-box;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    flex-direction: column;
    -webkit-box-align: center;
    align-items: center;
    max-width: 460px;
    width: 90vw;
    white-space: pre-line;
}
    
 #flyerExpand {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.92);
    z-index: 500;
    -webkit-box-align: center;
    align-items: center;
    -webkit-box-pack: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    -webkit-transition: opacity 0.2s ease;
    transition: opacity 0.2s ease;
    cursor: pointer;
}
#flyerExpand.active {
    display: -webkit-box;
    display: flex;
    opacity: 1;
    pointer-events: auto;
}
#flyerExpand img {
    max-width: calc(100vw - 20px);
    max-height: calc(100vh - 20px);
    border-radius: 8px;
    object-fit: contain;
    display: block;
}   
    
.evt-detail-flyer {
    width: 93%;
    max-width: 550px;
    border-radius: 10px;
    object-fit: cover;
    margin-bottom: 4px;
    opacity: 0;
    -webkit-transform: translate(-16px, 16px) scale(0.82);
    transform: translate(-16px, 16px) scale(0.82);
    -webkit-transition: opacity 0.35s ease, -webkit-transform 0.35s ease;
    transition: opacity 0.35s ease, transform 0.35s ease;
    display: block;
}
.evt-detail-flyer.shown {
    opacity: 1;
    -webkit-transform: translate(0,0) scale(1);
    transform: translate(0,0) scale(1);
}
.evt-detail-noflyer {
    display: none;
}
.evt-detail-body {
    margin-top: 16px;
    color: white;
    text-align: center;
    width: 100%;
    opacity: 0;
    -webkit-transition: opacity 0.35s ease 0.2s;
    transition: opacity 0.35s ease 0.2s;
}
.evt-detail-body.shown {
    opacity: 1;
}
.evt-detail-title {
    font-size: 1.2rem;
    font-weight: bold;
    color: rgba(255,255,255,0.95);
    margin-bottom: 6px;
}
.evt-detail-desc {
    font-size: 0.88rem;
    line-height: 1.45;
    margin-bottom: 10px;
    color: rgba(255,255,255,0.8);
    line-height: 1.05;
}
.evt-detail-info {
    font-size: 1rem;
    color: rgba(255,255,255,0.9);
    margin-bottom: 4px;
}
.evt-detail-club {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 18px;
    font-style: italic;
}
.evt-close-btn {
    font-size: 1.1rem;
    font-weight: bold;
    color: white;
    background: none;
    border: 2px solid white;
    border-radius: 6px;
    padding: 6px 24px;
    cursor: pointer;
    letter-spacing: 0.05em;
    -webkit-tap-highlight-color: transparent;
    -webkit-transition: background 0.1s ease, color 0.1s ease;
    transition: background 0.1s ease, color 0.1s ease;
    -webkit-user-select: none;
    user-select: none;
}
.evt-close-btn.holding {
    background: white;
    color: black;
}

/* end events styles */
</style>

<script>
/* ================= STATE ================= */
var primarySelected = "clubs";
var subSelected = "tab1";
var clubDataJSON = {};
var _labelTimer = null; /* pending label-reset timeout */

/* ========== EVENTS STATE ========== */
var eventsDataJSON = [];

/* How many days "Upcoming" shows when no filter is active */
var UPCOMING_DAYS = 5;

/* Active filter — "all" means none selected */
var evtSelectedFilter = "all";

/* Filter dropdown open state */
var evtDropOpen = null;

/* --- Timeframe nav state ---
   evtModes: built once data loads — array of mode objects in nav order.
   evtModeIdx: current position in that array.
   A mode object: { id: string, label: string, startDate: "YYYY-MM-DD"|null, endDate: "YYYY-MM-DD"|null }
   Special id "upcoming" has no date range — uses UPCOMING_DAYS logic instead. */
var evtModes = [];
var evtModeIdx = 0;   /* "Upcoming" will always be index 0 */

/* ================= PRIMARY TAB SWITCH ================= */
function selectPrimary(tab) {
    primarySelected = tab;

    document.getElementById("clubsTab").classList.remove("active");
    document.getElementById("eventsTab").classList.remove("active");
    document.getElementById(tab + "Tab").classList.add("active");

    if (tab === "clubs") {
        document.getElementById("subTabs").style.display = "block";
        document.getElementById("clubContainer").style.display = "block";
        document.getElementById("eventsSection").style.display = "none";
        renderClubs();
    } else {
        document.getElementById("subTabs").style.display = "none";
        document.getElementById("clubContainer").style.display = "none";
        document.getElementById("eventsSection").style.display = "block";
        renderEvents();
    }
}

/* ================= SUB TAB SWITCH ================= */
function selectSub(tab) {
    subSelected = tab;
    var tabs = document.querySelectorAll(".sub-tab");
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
    document.getElementById(tab).classList.add("active");
    renderClubs();
}

/* ================= RENDER CLUBS ================= */
function renderClubs() {
    var container = document.getElementById("clubContainer");
    container.innerHTML = "";
    var list = clubDataJSON[subSelected];
    if (!list) return;
    for (var i = 0; i < list.length; i++) {
        var club = list[i];
        var box = document.createElement("div");
        box.className = "club-box";
        var wrapper = document.createElement("div");
        wrapper.className = "club-wrapper";
        var icon = document.createElement("img");
        icon.className = "club-icon";
        var baseName = club.line1.replace(/\s+/g, "");
        var iconFolder = "images/icons/";
        var sources = [iconFolder + baseName + ".png", iconFolder + baseName + ".jpg"];
        if (club.icon) sources.push(iconFolder + club.icon);
        sources.push(iconFolder + "default.svg");
        var tried = 0;
        icon.src = sources[tried];
        icon.onerror = (function(srcArr) {
            var t = { v: 0 };
            return function() {
                t.v++;
                if (t.v < srcArr.length) {
                    this.onerror = arguments.callee;
                    this.src = srcArr[t.v];
                }
            };
        })(sources);
        var textContainer = document.createElement("div");
        textContainer.className = "club-text";
        textContainer.innerHTML =
            '<div class="club-line1">' + (club.line1||"") + '</div>' +
            '<div class="club-line">'  + (club.line2||"") + '</div>' +
            '<div class="club-line">'  + (club.line3||"") + '</div>' +
            '<div class="club-line">'  + (club.line4||"") + '</div>';
        wrapper.appendChild(icon);
        wrapper.appendChild(textContainer);
        box.appendChild(wrapper);
        container.appendChild(box);
    }
}

/* ================= INITIAL LOAD ================= */
window.onload = function() {
    selectPrimary("events");
    /* Load clubs.json */
    if (typeof fetch !== "undefined") {
        fetch("contents/clubs.json")
            .then(function(res){ return res.json(); })
            .then(function(data){
                clubDataJSON = data;
                selectSub("tab1");
            })
            .catch(function(err){
                console.error("clubs.json error:", err);
                clubDataJSON = { "tab1":[], "tab2":[], "tab3":[], "tab4":[] };
            });
        /* Load events.json */
        fetch("contents/events.json")
            .then(function(res){ return res.json(); })
            .then(function(data){
                eventsDataJSON = data.events || [];
                /* Build mode list now that we have event dates */
                buildTimeframeModes();
                if (primarySelected === "events") renderEvents();
            })
            .catch(function(err){
                console.error("events.json error:", err);
                eventsDataJSON = [];
                buildTimeframeModes();
            });
    } else {
        clubDataJSON = { "tab1":[], "tab2":[], "tab3":[], "tab4":[] };
        buildTimeframeModes();
    }
};

/* ================= EMAIL CLICK ================= */
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('email')) {
        e.target.textContent = e.target.dataset.email;
    }
});

/* ============================================================
   EVENTS LOGIC
   =========================================================== */

/* helpers */
function padZ(n){ return n < 10 ? "0"+n : ""+n; }
function dateStr(d){ return d.getFullYear()+"-"+padZ(d.getMonth()+1)+"-"+padZ(d.getDate()); }

function todayDate(){
    var n = new Date();
    return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}
function parseDate(s){ /* "YYYY-MM-DD" -> local Date */
    var p = s.split("-");
    return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
}
var DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var DAY_FULL  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var MON_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function fmtHeading(dateS){
    var d = parseDate(dateS);
    return DAY_FULL[d.getDay()] + " " + MON_SHORT[d.getMonth()] + " " + d.getDate();
}
function fmtTime(t){
    if (!t || t === "") return "";
    if (t.indexOf("AM") !== -1 || t.indexOf("PM") !== -1) return t.trim();
    var parts = t.split(":");
    var h = parseInt(parts[0]), m = parseInt(parts[1]);
    if (isNaN(h)) return "";
    var suffix = h >= 12 ? "PM" : "AM";
    var h12 = h % 12 || 12;
    return h12 + (m ? ":"+padZ(m) : "") + " " + suffix;
}
function isEventExpired(evt){
    return false;
}

/* --- Get Monday of the week containing date d --- */
function getMondayOf(d){
    var day = d.getDay(); /* 0=Sun */
    var diff = (day === 0) ? -6 : 1 - day;
    var m = new Date(d);
    m.setDate(d.getDate() + diff);
    return m;
}

/* --- Get Sunday of the week containing date d --- */
function getSundayOf(d){
    var mon = getMondayOf(d);
    var sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    return sun;
}

/* -------------------------------------------------------
   buildTimeframeModes()
   Called once after events load.
   Builds evtModes array:
     [0] Upcoming  (always index 0)
     [1] This Week
     [2..] Next Week, Week of MM/DD ... (future weeks that have events)
   Also inserts Last Week before index 0 only if it has events.
   The array can grow leftward (past weeks) and rightward (future).
   But we only include weeks that actually contain at least one event.
------------------------------------------------------- */
function buildTimeframeModes(){
    var today = todayDate();
    var todayS = dateStr(today);

    /* Collect all event dates (past and future, expired or not) */
    var dateset = {};
    for (var i = 0; i < eventsDataJSON.length; i++){
        dateset[eventsDataJSON[i].date] = true;
    }

    /* Find which weeks have events */
    var weekKeys = {};
    for (var ds in dateset){
        var mon = getMondayOf(parseDate(ds));
        weekKeys[dateStr(mon)] = true;
    }

    /* Sort week mondays oldest -> newest */
    var weekMondays = [];
    for (var k in weekKeys) weekMondays.push(k);
    weekMondays.sort();

// New
    /* "This week" anchor: Mon-Fri -> current week's Monday.
        Sat-Sun -> NEXT week's Monday (week hasn't started yet). */
    var todayDay = today.getDay(); /* 0=Sun, 6=Sat */
    var anchorMon = getMondayOf(today);
    if (todayDay === 0 || todayDay === 6){
        /* Weekend: push anchor forward to next Monday */
        anchorMon = new Date(anchorMon.getFullYear(), anchorMon.getMonth(), anchorMon.getDate() + 7);
    }
    var thisMonS = dateStr(anchorMon);

    var modes = [];

    /* LEFT side: all weeks before anchor, oldest first */
    for (var wi = 0; wi < weekMondays.length; wi++){
        if (weekMondays[wi] < thisMonS) modes.push(makeModeForWeek(weekMondays[wi]));
    }

    /* This week immediately left of Upcoming */
    if (weekKeys[thisMonS]) modes.push(makeModeForWeek(thisMonS));

    /* Upcoming is the center/default */
    modes.push({ id: "upcoming", label: "Upcoming" });
    evtModeIdx = modes.length - 1;

    /* RIGHT side: all weeks after anchor */
    for (var wi = 0; wi < weekMondays.length; wi++){
        if (weekMondays[wi] > thisMonS) modes.push(makeModeForWeek(weekMondays[wi]));
    }

    evtModes = modes;
    updateNavLabel(null);
    updateNavArrows();
}

/* Build a mode object for the week starting on mondayStr */
function makeModeForWeek(mondayStr){
    var mon = parseDate(mondayStr);
    var sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    var today = todayDate();
    var todayDay = today.getDay();
    /* Same anchor logic as buildTimeframeModes */
    var anchorMon = getMondayOf(today);
    if (todayDay === 0 || todayDay === 6){
        anchorMon = new Date(anchorMon.getFullYear(), anchorMon.getMonth(), anchorMon.getDate() + 7);
    }
    var thisMonS = dateStr(anchorMon);
    var lastMonS = dateStr(new Date(anchorMon.getFullYear(), anchorMon.getMonth(), anchorMon.getDate() - 7));
    var nextMonS = dateStr(new Date(anchorMon.getFullYear(), anchorMon.getMonth(), anchorMon.getDate() + 7));

    var label;
    if (mondayStr === thisMonS) {
        label = "This Week";
    } else if (mondayStr === lastMonS) {
        label = "Last Week";
    } else if (mondayStr === nextMonS) {
        label = "Next Week";
    } else {
        /* Week of M/D  e.g. "Week of 3/23" */
        label = "Week of " + (mon.getMonth()+1) + "/" + mon.getDate();
    }

    return {
        id: "week_" + mondayStr,
        label: label,
        startDate: mondayStr,
        endDate: dateStr(sun)
    };
}

/* --- build filtered+sorted event list for display --- */
function getDisplayEvents(){
    var today = todayDate();
    var todayS = dateStr(today);
    var mode = evtModes[evtModeIdx];
    if (!mode) return [];
    var list = eventsDataJSON.slice();

    if (mode.id === "upcoming") {
        /* Drop expired and past */
        list = list.filter(function(e){ return !isEventExpired(e) && e.date >= todayS; });

        if (evtSelectedFilter !== "all"){
            /* Filtered upcoming: show all future matching, no day cap */
            list = list.filter(function(e){ return e.type === evtSelectedFilter; });
        } else {
            /* Unfiltered: cap to next UPCOMING_DAYS event-days */
            var dateSeen = {};
            var seenDates = [];
            var tempSorted = list.slice().sort(function(a,b){
                return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
            });
            for (var di = 0; di < tempSorted.length; di++){
                var ds = tempSorted[di].date;
                if (!dateSeen[ds]){
                    dateSeen[ds] = true;
                    seenDates.push(ds);
                    if (seenDates.length === UPCOMING_DAYS) break;
                }
            }
            list = list.filter(function(e){ return dateSeen[e.date]; });
        }

    } else {
        /* Week mode: full Mon-Sun of whatever week the mode covers.
           No expiry filtering on week views — show everything scheduled. */
        list = list.filter(function(e){
            return e.date >= mode.startDate && e.date <= mode.endDate;
        });

        if (evtSelectedFilter !== "all"){
            list = list.filter(function(e){ return e.type === evtSelectedFilter; });
        }
    }

    /* Sort by date then startTime then priority */
    list.sort(function(a,b){
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        if (a.startTime !== b.startTime) return a.startTime < b.startTime ? -1 : 1;
        return (a.priority||3) - (b.priority||3);
    });
    return list;
}
/* --- Render the event list --- */
function renderEvents(){
    var container = document.getElementById("eventContainer");
    if (!container) return;
    container.innerHTML = "";
    var list = getDisplayEvents();
    if (list.length === 0) {
        var msg = document.createElement("div");
        msg.style.cssText = "color:rgba(255,255,255,0.7);font-size:0.9rem;margin-top:20px;text-align:center;";
        msg.textContent = "No events to show.";
        container.appendChild(msg);
        return;
    }
    var lastDate = null;
    for (var i = 0; i < list.length; i++) {
        var evt = list[i];
        if (evt.date !== lastDate) {
            var head = document.createElement("div");
            head.className = "evt-day-head";
            head.textContent = fmtHeading(evt.date);
            container.appendChild(head);
            lastDate = evt.date;
        }
        container.appendChild(buildEventBox(evt));
    }
}

/* --- derive icon filename from full flyer filename --- */
function iconFromFlyer(flyer){
    var dot = flyer.lastIndexOf(".");
    if (dot === -1) return flyer + "-icon";
    return flyer.slice(0, dot) + "-icon" + flyer.slice(dot);
}

function buildEventBox(evt){
    var box = document.createElement("div");
    box.className = "evt-box";
    box.setAttribute("data-evtid", evt.id);

    var iconWrap = document.createElement("div");
    iconWrap.className = "evt-icon-wrap";
    if (evt.flyer) {
        var img = document.createElement("img");
        img.className = "evt-icon-img";
        img.src = "flyers/" + iconFromFlyer(evt.flyer);
        img.alt = "";
        img.onerror = function(){
            if (iconWrap.contains(this)) iconWrap.removeChild(this);
        };
        iconWrap.appendChild(img);
    }
    box.appendChild(iconWrap);

    var text = document.createElement("div");
    text.className = "evt-text";

    var title = document.createElement("div");
    title.className = "evt-title";
    title.textContent = evt.title;
    if (evt.title.length > 32) title.style.fontSize = "0.78rem";

    var meta = document.createElement("div");
    meta.className = "evt-meta";
    var timeStr = fmtTime(evt.startTime);
    var endStr  = fmtTime(evt.endTime);
    if (endStr) timeStr += " \u2013 " + endStr;
    meta.textContent = (evt.time || "") + "  \u00b7  " + evt.room;

    text.appendChild(title);
    text.appendChild(meta);
    box.appendChild(text);

    box.onclick = function(){ openEvtDetail(evt); };
    return box;
}

/* --- Event detail overlay --- */
function openEvtDetail(evt){
    var overlay = document.getElementById("evtOverlay");
    var detail  = document.getElementById("evtDetail");
    detail.innerHTML = "";

    if (evt.flyer) {
        var flyer = document.createElement("img");
        flyer.className = "evt-detail-flyer";
        flyer.onclick = function(e) {
            e.stopPropagation();
            openFlyerExpand(this.src);
        };
        flyer.alt = evt.title;
        flyer.onerror = function(){
            flyer.style.display = "none";
        };
        detail.appendChild(flyer);

        var body = buildDetailBody(evt);
        detail.appendChild(body);

        overlay.classList.add("active");
        document.body.style.overflow = "hidden";

        setTimeout(function(){
            flyer.src = "flyers/" + evt.flyer;
            flyer.classList.add("shown");
            body.classList.add("shown");
        }, 30);
    } else {
        var body2 = buildDetailBody(evt);
        detail.appendChild(body2);
        overlay.classList.add("active");
        document.body.style.overflow = "hidden";
        setTimeout(function(){ body2.classList.add("shown"); }, 30);
    }
}

function buildDetailBody(evt){
    var body = document.createElement("div");
    body.className = "evt-detail-body";

    var t = document.createElement("div");
    t.className = "evt-detail-title";
    t.textContent = evt.title;

    var desc = document.createElement("div");
    desc.className = "evt-detail-desc";
    var descParts = (evt.description || "").split("<br>");
    for (var dp = 0; dp < descParts.length; dp++) {
        if (dp > 0) desc.appendChild(document.createElement("br"));
        desc.appendChild(document.createTextNode(descParts[dp]));
    }

    var info = document.createElement("div");
    info.className = "evt-detail-info";
    var dTimeStr = fmtTime(evt.startTime);
    var dEndStr  = fmtTime(evt.endTime);
    if (dEndStr) dTimeStr += " \u2013 " + dEndStr;
    info.textContent = fmtHeading(evt.date) + "  \u00b7  " + (evt.time || "") + "  \u00b7  " + evt.room;

    var club = document.createElement("div");
    club.className = "evt-detail-club";
    club.textContent = evt.club || "";

    var close = document.createElement("button");
    close.className = "evt-close-btn";
    close.textContent = "CLOSE \u2715";

    var holdActive = false;

    function onHoldStart() {
        holdActive = true;
        close.classList.add("holding");
    }
    function onHoldEnd() {
        if (holdActive) { closeEvtDetail(); }
        holdActive = false;
        close.classList.remove("holding");
    }
    function onHoldAbort() {
        holdActive = false;
        close.classList.remove("holding");
    }

    close.addEventListener("mousedown",  onHoldStart);
    close.addEventListener("mouseup",    onHoldEnd);
    close.addEventListener("mouseleave", onHoldAbort);
    close.addEventListener("touchstart",  function(e){ e.preventDefault(); onHoldStart(); }, {passive: false});
    close.addEventListener("touchend",    function(e){ e.preventDefault(); onHoldEnd();   }, {passive: false});
    close.addEventListener("touchcancel", function(e){ onHoldAbort(); });
    close.addEventListener("touchmove", function(e) {
        var touch = e.touches[0];
        var rect = close.getBoundingClientRect();
        var outside = touch.clientX < rect.left - 10 || touch.clientX > rect.right + 10 ||
                      touch.clientY < rect.top  - 10 || touch.clientY > rect.bottom + 10;
        if (outside) onHoldAbort();
    }, {passive: true});

    body.appendChild(t);
    body.appendChild(desc);
    body.appendChild(info);
    body.appendChild(club);
    body.appendChild(close);
    return body;
}

function closeEvtDetail(){
    var overlay = document.getElementById("evtOverlay");
    overlay.classList.remove("active");
    document.body.style.overflow = "";
}

/* ---- Tap-outside-content to close overlay ---- */
document.addEventListener("DOMContentLoaded", function(){
(function(){
    var downX = 0, downY = 0;

    document.getElementById("evtOverlay").addEventListener("mousedown", function(e){
        downX = e.clientX; downY = e.clientY;
    });
    document.getElementById("evtOverlay").addEventListener("touchstart", function(e){
        downX = e.touches[0].clientX; downY = e.touches[0].clientY;
    }, {passive: true});

    function handleClose(e) {
        var overlay = document.getElementById("evtOverlay");
        if (!overlay.classList.contains("active")) return;
        var upX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
        var upY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
        var dist = Math.sqrt(Math.pow(upX - downX, 2) + Math.pow(upY - downY, 2));
        if (dist > 8) return;
        var target = e.target;
        if (target.closest(".evt-close-btn")) return;
        if (target.closest(".evt-detail-flyer")) return;
        e.stopPropagation();
        e.preventDefault();
        closeEvtDetail();
    }

    document.getElementById("evtOverlay").addEventListener("mouseup",   handleClose);
    document.getElementById("evtOverlay").addEventListener("touchend",  handleClose, {passive: false});
}());
});

/* ============================================================
   TIMEFRAME NAV  < Upcoming >
   =========================================================== */

/* Update the visible label with optional slide animation.
   dir: null=no anim, -1=slide right-to-left (going right), 1=slide left-to-right (going left) */
// New
function updateNavLabel(dir){
    var mode = evtModes[evtModeIdx];
    if (!mode) return;
    var track = document.getElementById("evtLabelTrack");
    if (!track) return;
    var slotA = document.querySelector("#evtLabelSlotA .evt-label-text");
    var slotB = document.querySelector("#evtLabelSlotB .evt-label-text");
    if (!slotA || !slotB) return;

    /* Kill any pending cleanup from a previous animation */
    if (_labelTimer){ clearTimeout(_labelTimer); _labelTimer = null; }

    if (dir === null){
        /* No animation — instant set */
        slotA.textContent = mode.label;
        slotB.textContent = "";
        track.style.webkitTransition = "none";
        track.style.transition = "none";
        track.style.webkitTransform = "translateX(0)";
        track.style.transform = "translateX(0)";
        return;
    }

    if (dir === 1){
        /* Pressed > : new label enters from right.
           slotA = old (currently visible), slotB = new (waiting right).
           Slide track left so slotB comes into view. */
        slotB.textContent = mode.label;
        track.style.webkitTransition = "none";
        track.style.transition = "none";
        track.style.webkitTransform = "translateX(0)";
        track.style.transform = "translateX(0)";
        void track.offsetWidth;
        track.style.webkitTransition = "-webkit-transform 0.28s ease";
        track.style.transition = "transform 0.28s ease";
        track.style.webkitTransform = "translateX(-50%)";
        track.style.transform = "translateX(-50%)";
        /* After slide: reset track so slotA holds new label at position 0 */
        _labelTimer = setTimeout(function(){
            slotA.textContent = mode.label;
            slotB.textContent = "";
            track.style.webkitTransition = "none";
            track.style.transition = "none";
            track.style.webkitTransform = "translateX(0)";
            track.style.transform = "translateX(0)";
            _labelTimer = null;
        }, 300);

    } else {
        /* Pressed < : new label enters from left.
           Put new label in slotA, old label in slotB.
           Start track shifted so slotB (old, right) is showing.
           Slide track right so slotA (new, left) comes into view. */
        var oldLabel = slotA.textContent;
        slotA.textContent = mode.label;  /* new text — immediately correct */
        slotB.textContent = oldLabel;    /* old text sits off to the right */
        track.style.webkitTransition = "none";
        track.style.transition = "none";
        track.style.webkitTransform = "translateX(-50%)"; /* start showing slotB */
        track.style.transform = "translateX(-50%)";
        void track.offsetWidth;
        track.style.webkitTransition = "-webkit-transform 0.28s ease";
        track.style.transition = "transform 0.28s ease";
        track.style.webkitTransform = "translateX(0)";    /* slide to show slotA */
        track.style.transform = "translateX(0)";
        /* After slide: just clear slotB */
        _labelTimer = setTimeout(function(){
            slotB.textContent = "";
            _labelTimer = null;
        }, 300);
    }
}
/* Dim/enable the < and > arrows based on position in evtModes */
function updateNavArrows(){
    var leftBtn  = document.getElementById("evtNavLeft");
    var rightBtn = document.getElementById("evtNavRight");
    if (!leftBtn || !rightBtn) return;
    /* Left arrow: disabled when at index 0 */
    if (evtModeIdx <= 0){
        leftBtn.classList.add("disabled");
    } else {
        leftBtn.classList.remove("disabled");
    }
    /* Right arrow: disabled when at last index */
    if (evtModeIdx >= evtModes.length - 1){
        rightBtn.classList.add("disabled");
    } else {
        rightBtn.classList.remove("disabled");
    }
}

/* Called when user taps < or > */
function navTimeframe(dir){ /* dir: -1 = left (<), +1 = right (>) */
    var newIdx = evtModeIdx + dir;
    if (newIdx < 0 || newIdx >= evtModes.length) return; /* already at edge */
    evtModeIdx = newIdx;
    updateNavLabel(dir);   /* dir -1 = going left visually = slide right-to-left? */
    /* Slide direction: pressing > (dir +1) means content slides left (incoming from right) */
    /* updateNavLabel receives: -1 for "incoming from right", +1 for "incoming from left" */
    /* We already called with dir above which matches that convention exactly */
    updateNavArrows();
    renderEvents();
}

/* ============================================================
   FILTER LOGIC
   =========================================================== */

function pickFilter(type){
    evtSelectedFilter = type;

    /* Update filter button label to show selected filter name */
    var flBtn = document.getElementById("evtFilterBtn");
    if (flBtn){
        var label = type === "all" ? "Filters" : filterLabel(type);
        flBtn.innerHTML = label + ' <span class="arrow">\u25be</span>';
    }

    /* Update filter option selected states */
    var opts = document.querySelectorAll(".filter-opt");
    for (var i = 0; i < opts.length; i++){
        if (opts[i].getAttribute("data-type") === type){
            opts[i].classList.add("selected");
        } else {
            opts[i].classList.remove("selected");
        }
    }

    closeDropdowns();
    renderEvents();
}

/* Maps filter data-type to a readable label for the button */
function filterLabel(type){
    var map = {
        "all": "Filters",
        "sports game": "Sports Games",
        "performance": "Performances",
        "club event": "Club Events",
        "other": "Other"
    };
    return map[type] || type;
}

/* --- Dropdown open/close (filter only now) --- */
function toggleDropdown(which){
    var filterBox = document.getElementById("evtFilterDrop");
    var flBtn     = document.getElementById("evtFilterBtn");

    if (evtDropOpen === which){
        filterBox.classList.remove("open");
        flBtn.classList.remove("open");
        evtDropOpen = null;
    } else {
        filterBox.classList.add("open");
        flBtn.classList.add("open");
        evtDropOpen = which;
    }
}

function closeDropdowns(){
    var filterBox = document.getElementById("evtFilterDrop");
    var flBtn     = document.getElementById("evtFilterBtn");
    if (filterBox) filterBox.classList.remove("open");
    if (flBtn)     flBtn.classList.remove("open");
    evtDropOpen = null;
}

/* ---- Click-outside: close filter dropdown ---- */
document.addEventListener("click", function(e){
    if (evtDropOpen === null) return;
    var filterDrop = document.getElementById("evtFilterDrop");
    var flBtn      = document.getElementById("evtFilterBtn");
    if (!filterDrop) return;
    var inFilter = filterDrop.contains(e.target) || flBtn.contains(e.target);
    if (!inFilter) closeDropdowns();
});

/* ---- Flyer expand ---- */
function openFlyerExpand(src) {
    var el = document.getElementById("flyerExpand");
    var img = document.getElementById("flyerExpandImg");
    img.src = src;
    el.style.display = "-webkit-box";
    el.style.display = "flex";
    void el.offsetWidth;
    el.classList.add("active");
}

function closeFlyerExpand() {
    var el = document.getElementById("flyerExpand");
    el.classList.remove("active");
    setTimeout(function(){ el.style.display = "none"; }, 220);
}
