<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>handshake</title>
<style>body { font-family: monospace; font-size: 3em; text-align:center; margin-top: 20vh; }</style>
</head>
<body>
<div id="otp">hello</div>

<script>
const base32chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";

function base32toUint8Array(base32) {
  let bits = 0, value = 0, index = 0;
  const output = new Uint8Array(base32.length * 5 / 8);
  base32 = base32.replace(/=+$/, '').toUpperCase();

  for (let i = 0; i < base32.length; i++) {
    const val = base32chars.indexOf(base32.charAt(i));
    if (val === -1) continue;
    value = (value << 5) | val;
    bits += 5;

    if (bits >= 8) {
      output[index++] = (value >>> (bits - 8)) & 0xff;
      bits -= 8;
    }
  }
  return output;
}

async function generateTOTP(secret, timeStep=30) {
  const key = await crypto.subtle.importKey(
    "raw",
    secret,
    {name: "HMAC", hash: "SHA-1"},
    false,
    ["sign"]
  );

  const epoch = Math.floor(Date.now() / 1000);
  const counter = new ArrayBuffer(8);
  new DataView(counter).setBigUint64(0, BigInt(Math.floor(epoch / timeStep)));

  const hmac = await crypto.subtle.sign("HMAC", key, counter);
  const hash = new Uint8Array(hmac);
  const offset = hash[hash.length - 1] & 0xf;

  const binary =
    ((hash[offset] & 0x7f) << 24) |
    ((hash[offset + 1] & 0xff) << 16) |
    ((hash[offset + 2] & 0xff) << 8) |
    (hash[offset + 3] & 0xff);

  const otp = (binary % 1_000_000).toString().padStart(6, '0');
  return otp;
}


const secretBase32 = "QUOUOSZMGGAMMITH";
const secretBytes = base32toUint8Array(secretBase32);

async function updateOTP() {
  const otp = await generateTOTP(secretBytes);
  document.getElementById('otp').textContent = otp;
}

setInterval(updateOTP, 1000);
updateOTP();


</script>
</body>
</html>
