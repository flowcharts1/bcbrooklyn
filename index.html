<head>

<style>

    --maroon: #882346;
    --light-gray: #FAF0C5;
    --text-dark: #111;
    --hero:#1D4B52;
    --yellow: #f4c542;
    --light-yellow: #fff6d6;
    --box-spacing: 15px;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
.page-wrap {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
}
html, body {
  height: 100%;
}  
.mobile-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 110vh;
 /* height: 100lvh; */
  /*height: -webkit-fill-available; /* old iOS fix */
  overflow: hidden;
  z-index: -1;

  transform: translateZ(0);
  will-change: transform;
  backface-visibility: hidden;
}
.mobile-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-dark);
    margin:0;
    text-align:center;
    display: flex;
    flex-direction: column;
}
/* ===== HERO TEXT ===== */
.herop{
    position: absolute;
    top: 1px;          /* adjust */
    left: 50%;
    transform: translateX(-50%);
     }
.hero h1 {
    padding-top:15px;
    padding: 10px;
    text-align: center;
    font-size: clamp(2.5rem, 4vw, 20rem);
    line-height: 0.1; 
    font-weight: 500;
    line-height: 1;
    color: var(--hero); /* soft light blue */
    letter-spacing: -0.5px;
    
    /* this text shadow is to make text fatter. */

    0.5px 0 0 currentColor,
    -0.5px 0 0 currentColor;
    /*  this text shadow is to actually add a shadow */

    0 0 16px rgba(255, 255, 255,0.8),
    0 0 16px rgba(255, 255, 255,0.8); 
} 
.heroh {
        padding-top: 10px;
  border-top: 1px solid transparent;
        text-align: center;
    color:var(--hero);
    
 text-shadow:
  0 0 16px rgba(255, 255, 255,10),
  0 0 16px rgba(255, 255, 255,0.8);
  
 
}
/* title-break is to break the title in half cleaner*/
.title-break {
  display: none;
}
@media (max-width: 560px) {  /* adjust breakpoint so it breaks cleanly at a certain width */
  .title-break {
    display: inline;
  }
}
/* Desktop layout */
@media (min-width: 768px) {    
/*
    .mobile-bg {
    display: none;
  }
    
.page-wrap {
    background: url("fullimage.jpg") center / cover no-repeat;
    background-color: #A7B9EB;
    background-attachment: fixed;
    min-height: 100vh;
    flex: 1; 
  }
    */
}
    
/* ==== MAIN CONTENT ==== */    
.primary-tabs {
    margin-top: 10px;
}
.primary-tab {
    display: inline-block;
    padding: 1px 10px 1px; /*top, outer side, bottom.*/
    margin: 5px; /*gapin between*/
    border-radius: 12px;
    font-size: 25px;
    font-weight: bold;
    cursor: pointer;
    border: 0px solid var(--yellow);  /*TEMP*/
    background: transparent;   /*TEMPORARY */
    color: var(--yellow);
    transition: 0.2s ease;
    
}
.primary-tab.active {
    background: var(--yellow);
    color: white;
     border: 3px solid var(--yellow);  /*TEMP*/
}
/* ======== SUB TABS (OFF) ======== */
.sub-tabs {
    margin-top: 40px;
    display:none;
    pointer-events: none;
}/*off*/ 
.sub-tab {
    /*display: inline-block;*/
    display: none;
    pointer-events: none;
    padding: 15px 50px;
    margin: 10px;
    border-radius: 12px;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    border: 3px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    transition: 0.2s ease;
}/*off*/
.sub-tab.active {
    background: var(--yellow);
    color: white;
}
/* ========= CLUB LIST ======= */
#clubContainer {
    width: 90%;
    max-width: 1000px;
    margin: 10px auto;
}
/* Club Card */
.club-box {
    background: white;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: var(--box-spacing);
    text-align: left;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
/* Layout: Icon + Text */
.club-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
}
/* Icon */
.club-icon {
    width: 60px;
    height: 60px;
    border-radius: 30px;
    object-fit: cover;
    background: transparent;
}
/* Text Area */
.club-text {
    flex: 1;
}
/* Line 1 (Title) */
.club-line1 {
    font-size: 1em;
    font-weight: bold;
    margin-bottom: 1px;
}
/* Other Lines */
.club-line {
    font-size: 1em;
    margin: 3px 0;
}

/* Links */
.club-line a {
    text-decoration: none;
    font-weight: bold;
    color: #3366cc;
}
.club-line span {
    text-decoration: none;
    font-weight: bold;
    color: #3366cc;
}
.club-line a:hover {
    text-decoration: underline;
}
.club-line span:hover{
        text-decoration: underline;
    }


.spinner {
  display: inline-block; /* required for transform */
  cursor: pointer;
     display: inline-block;
  transform-origin: center center;
  flex: 0 0 auto;     /* prevents flex resizing */
}
.spin {
  animation: spinOnce 0.6s linear;
}
@keyframes spinOnce {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
    
/* ===== BOTTOM BAR ===== */
    
    
.bike-icon {
  height: 1.2em;
  display: block;
  filter: invert(1); /* turns black svg white */
}
    
.bottom-bar {
    background: var(--maroon);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 20px;
    font-size: 0.85rem;
     margin-top: auto;
    
}
.bottom-bar a {
    color: white;
    text-decoration: none;
}
.contact-btn {
    padding: 4px 10px;
    border: 1px solid white;
    border-radius: 4px;
    transition: background 0.15s ease;
}
.contact-btn:hover {
    background: white;
    color: var(--maroon);
}  
</style>
    
    
    
<script>

/* ================= STATE ================= */

let primarySelected = "clubs";
let subSelected = "tab1";

/* ================= BASELINE JSON ================= */

let clubDataJSON = {};

/* ================= PRIMARY TAB SWITCH ================= */

function selectPrimary(tab) {
    primarySelected = tab;

    
    
   
    
    document.getElementById("clubsTab").classList.remove("active");
    document.getElementById("eventsTab").classList.remove("active");

    document.getElementById(tab + "Tab").classList.add("active");

    if (tab === "clubs") {
        document.getElementById("subTabs").style.display = "block";
        renderClubs();
        
    } else {
        document.getElementById("subTabs").style.display = "none";
        document.getElementById("clubContainer").innerHTML = "";
        // EVENTS LOGIC EMPTY FOR NOW
    }
}

/* ================= SUB TAB SWITCH ================= */

function selectSub(tab) {
    subSelected = tab;

    let tabs = document.querySelectorAll(".sub-tab");
    tabs.forEach(t => t.classList.remove("active"));

    document.getElementById(tab).classList.add("active");

    renderClubs();
}



/* ================= RENDER CLUBS FROM JSON ================= */

function loadClubs() {

    fetch("clubs.json")
        .then(res => res.json())
        .then(data => {
            clubDataJSON = data;
            renderClubs();
        })
        .catch(err => {
            console.error("Error loading clubs.json:", err);
            // fallback to empty list if JSON fails
            clubDataJSON = { "tab1": [], "tab2": [], "tab3": [], "tab4": [] };
            renderClubs();
        });

}
    
    
    // ICONS IN HERE
function renderClubs() {
    let container = document.getElementById("clubContainer");
    container.innerHTML = "";

    let list = clubDataJSON[subSelected];
    if (!list) return;

    list.forEach(club => {
        let box = document.createElement("div");
        box.className = "club-box";

        // Wrapper for icon + text side by side
        let wrapper = document.createElement("div");
        wrapper.className = "club-wrapper";

        // Icon
        let icon = document.createElement("img");
        icon.className = "club-icon";

        let baseName = club.line1.replace(/\s+/g, "");
        let iconFolder = "icons/";
        let tryPNG = iconFolder + baseName + ".png";
        let tryJPG = iconFolder + baseName + ".jpg";
        let fallbackJSON = club.icon ? iconFolder + club.icon : null;
        let defaultIcon = iconFolder + "default.svg";

        // Try PNG → JPG → JSON → default
        let tried = 0;
        let sources = [tryPNG, tryJPG];
        if (fallbackJSON) sources.push(fallbackJSON);
        sources.push(defaultIcon);

        icon.src = sources[tried];
        icon.onerror = function() {
            tried++;
            if (tried < sources.length) {
                icon.onerror = arguments.callee; // keep the same handler
                icon.src = sources[tried];
            }
        };

        // Text container
        let textContainer = document.createElement("div");
        textContainer.className = "club-text";
        textContainer.innerHTML = `
            <div class="club-line1">${club.line1 || ""}</div>
            <div class="club-line">${club.line2 || ""}</div>
            <div class="club-line">${club.line3 || ""}</div>
            <div class="club-line">${club.line4 || ""}</div>
        `;

        wrapper.appendChild(icon);
        wrapper.appendChild(textContainer);
        box.appendChild(wrapper);
        container.appendChild(box);
    });
}
/* ================= INITIAL LOAD ================= */

window.onload = function() {
    selectPrimary("clubs"); // updates the tab UI

    fetch("clubs.json")
        .then(res => res.json())
        .then(data => {
            clubDataJSON = data;
            selectSub("tab1"); // <-- call AFTER data is loaded
        })
        .catch(err => {
            console.error("Error loading clubs.json:",err);
            clubDataJSON = { "tab1": [], "tab2": [], "tab3": [], "tab4": [] };
            selectSub("tab1"); // still call so page shows empty but doesn’t crash
        });
};
    
    

/*quick email function
email link format: <a class="email" data-email="email@gmail.com">email</a>*/
document.addEventListener('click', function (e) {
  if (e.target.classList.contains('email')) {
    e.target.textContent = e.target.dataset.email;
  }
});




</script>
    
    
    
</head>
    
<body>
<div class="mobile-bg">

</div>

<div class="primary-tabs">
    <div id="clubsTab" class="primary-tab active" onclick="selectPrimary('clubs')">CLUBS</div>

</div>

    <div id="tab1" class="sub-tab active" onclick="selectSub('tab1')">Tab1</div>
    <div id="tab2" class="sub-tab" onclick="selectSub('tab2')">Tab2</div>

  bcbrooklyn
</span>

    <span data-email="mkravets49@gmail.com" class="contact-btn email">Contact Me</span>
</div>
</div>

</body>
